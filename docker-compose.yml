services:

  # ── PostgreSQL with pgvector ────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    container_name: llm0_postgres
    environment:
      POSTGRES_USER: llm0
      POSTGRES_PASSWORD: llm0_password
      POSTGRES_DB: llm0_gateway
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      # Seeds default model pricing on first boot. Idempotent via ON CONFLICT DO NOTHING,
      # so user overrides (e.g. from scripts/manage_models.sh) are never touched.
      - ./schema/seed_models.sql:/docker-entrypoint-initdb.d/02_seed_models.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llm0 -d llm0_gateway"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ───────────────────────────────────────────────────────────────────
  # AOF is enabled because spend counters (spend:project:*, spend:customer:*)
  # are the source of truth for cap enforcement. A restart without persistence
  # would reset every project's current-month spend to $0 and let customers
  # re-burn their cap. `appendfsync everysec` gives at-most-1s data loss on
  # crash. See design/enforcement-and-caching.md → "What happens on a Redis
  # failure" for the full rationale and rebuild procedure.
  redis:
    image: redis:7-alpine
    container_name: llm0_redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Embedding Service (semantic caching) ────────────────────────────────────
  # Serves all-MiniLM-L6-v2 (384-dim) embeddings over HTTP.
  # The model (~90MB) is baked into the image at build time so startup is fast.
  # First build takes ~3-5 minutes while it downloads the model weights.
  # RAM: ~300MB. CPU-only — no GPU required.
  #
  # Footprint: ~3 GB image (PyTorch + sentence-transformers runtime), ~7 GB on
  # disk once all Docker layers are extracted. If you don't need semantic cache,
  # start without this service:
  #   docker compose up -d postgres redis gateway
  # Exact-match cache still works; semantic cache is disabled gracefully.
  embedding:
    build:
      context: ./embedding_service
      dockerfile: Dockerfile
    container_name: llm0_embedding
    ports:
      - "8001:8080"   # http://localhost:8001/embed  (external access for debugging)
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s   # model loading takes ~10-30s on first start

  # ── LLM0 Gateway ────────────────────────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llm0_gateway
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://llm0:llm0_password@postgres:5432/llm0_gateway?sslmode=disable
      REDIS_URL: redis://redis:6379
      EMBEDDING_SERVICE_URL: http://embedding:8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      embedding:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
